{% extends "candidate_page.html" %}

{% block title %}Chatbot{% endblock %}

{% block content %}
<div class="container1">
    <h1>Chat with our Bot</h1>
    <form method="post">
        <label for="user_input">You:</label>
        <input type="text" id="user_input" name="user_input" required>
        <button type="submit">Send</button>
    </form>
    {% if user_input and response %}
    <div class="chat-response">
        <p><strong>You:</strong> {{ user_input }}</p>
        <p><strong>Bot:</strong> {{ response }}</p>
    </div>
    {% endif %}
</div>
<style>
    .container1 {
        font-family: Arial, sans-serif;
        margin: 20px;
    }

    h1 {
        color: #333;
        text-align: center;
    }

    form {
        margin-bottom: 20px;
        margin-left: 20%;
    }

    label {
        font-size: 14px;
    }

    input[type="text"] {
        width: 80%;
        padding: 8px;
        margin: 10px 0;
        font-size: 14px;
    }

    button {
        padding: 8px 16px;
        font-size: 14px;
        cursor: pointer;
    }

    .chat-response {
        margin-top: 20px;
        font-size: 14px;
        margin-left: 20%;
    }

    .chat-response p {
        margin: 5px 0;
    }
</style>
{% endblock %}
